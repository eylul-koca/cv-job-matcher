<!DOCTYPE html>
<html>
<body style="font-family:Arial;padding:20px">
<h1>🧠 CV Test</h1>
<hr>

<h3>📤 1. PDF Yükle</h3>
<form id="yukle_form">
  <input type="file" id="pdf_dosya" accept=".pdf">
  <button type="button" onclick="pdfYukle()">Yükle</button>
</form>
<div id="yukle_sonuc"></div>

<hr>

<h3>🎯 2. Eşleştir</h3>
CV ID: <input id="esles_id" placeholder="55c4af6c" style="width:200px;padding:5px">
<br><br>
İş ilanı:<br>
<textarea id="is_ilani" rows="4" style="width:400px;padding:5px">JavaScript, HTML, CSS, Git, Unity bilen developer arıyoruz</textarea>
<br><br>
<button type="button" id="esles_btn" onclick="eslesmeYap()" style="padding:10px;background:blue;color:white;cursor:pointer">
  🎯 Eşleştir
</button>
<div id="esles_sonuc" style="margin-top:20px"></div>

<script>
function pdfYukle() {
  var dosya = document.getElementById('pdf_dosya').files[0];
  if(!dosya) { alert('PDF seç!'); return; }
  
  var form = new FormData();
  form.append('file', dosya);
  
  fetch('/yukle', {method:'POST', body:form})
    .then(function(r) { return r.json(); })
    .then(function(data) {
      document.getElementById('yukle_sonuc').innerHTML = 
        '✅ ID: <b>' + data.id + '</b>';
      document.getElementById('esles_id').value = data.id;
    });
}

function eslesmeYap() {
  document.getElementById('esles_sonuc').innerHTML = '⏳ Yükleniyor...';
  
  var id = document.getElementById('esles_id').value;
  var ilan = document.getElementById('is_ilani').value;
  
  if(!id) { alert('CV ID gir!'); return; }
  if(!ilan) { alert('İş ilanı gir!'); return; }
  
  fetch('/esles', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({cv_id: id, is_ilani: ilan})
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    var s = data.sonuc;
    document.getElementById('esles_sonuc').innerHTML = 
      '<h2>' + s.yorum + '</h2>' +
      '<h1 style="color:blue">%' + s.skor + ' Uyum</h1>' +
      '<p><b>✅ Eşleşen:</b> ' + s.eslesen_skills.join(', ') + '</p>' +
      '<p><b>❌ Eksik:</b> ' + s.eksik_skills.join(', ') + '</p>';
  })
  .catch(function(e) {
    document.getElementById('esles_sonuc').innerHTML = '❌ Hata: ' + e;
  });
}
</script>

</body>
</html>
